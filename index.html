<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a1a">
  <title>C Balloon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas { display: block; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.4); max-width: 100vw; max-height: 100vh; width: auto; height: auto; }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; justify-content: center; align-items: center;
      z-index: 10;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .panel {
      background: rgba(30,30,30,.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: clamp(16px, 4vw, 28px) clamp(20px, 5vw, 40px);
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      text-align: center;
      color: #f5f5f7;
      max-width: 90vw;
    }
    .panel .title { font-size: clamp(24px, 7vw, 32px); font-weight: 700; letter-spacing: 1px; }
    .panel .hint { font-size: clamp(13px, 3.5vw, 16px); color: #86868b; margin-top: 10px; font-weight: 600; }
    .panel .stat { font-size: clamp(15px, 4vw, 18px); font-weight: 700; margin: 4px 0; }
    .panel .stat.sub { font-size: clamp(12px, 3vw, 14px); color: #86868b; }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="panel" id="panel">
      <div class="title" id="panel-title"></div>
      <div id="panel-body"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.19.0/dist/pixi.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
